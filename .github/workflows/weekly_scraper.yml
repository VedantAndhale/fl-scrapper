name: Daily Scraper Update

on:
  schedule:
    # 10:00 IST every day (04:30 UTC)
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python main.py --output output/products.csv

      - name: Generate IST timestamp file
        run: |
          mkdir -p output
          TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST" > output/last_updated_ist.txt

      - name: Create Monday archive snapshot
        run: |
          IST_WEEKDAY="$(TZ=Asia/Kolkata date +%u)"
          if [ "$IST_WEEKDAY" -eq 1 ]; then
            mkdir -p output/archive
            SNAPSHOT_DATE="$(TZ=Asia/Kolkata date +%F)"
            cp output/products.csv "output/archive/products_${SNAPSHOT_DATE}.csv"
          else
            echo "Skipping archive creation because today is not Monday in IST."
          fi

      - name: Prune archive to 13 Monday snapshots
        run: |
          ls -1t output/archive/products_*.csv 2>/dev/null | tail -n +14 | xargs -r rm -f

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/products.csv output/last_updated_ist.txt output/archive/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: daily scraper data update"
          git push origin HEAD:${{ github.event.repository.default_branch }}
