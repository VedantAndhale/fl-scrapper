name: Weekly Scraper Update

on:
  schedule:
    # 09:00 IST every Monday (03:30 UTC)
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python main.py --output output/products.csv

      - name: Generate IST timestamp file
        run: |
          mkdir -p output
          TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST" > output/last_updated_ist.txt

      - name: Create weekly archive snapshot
        run: |
          mkdir -p output/archive
          SNAPSHOT_DATE="$(TZ=Asia/Kolkata date +%F)"
          cp output/products.csv "output/archive/products_${SNAPSHOT_DATE}.csv"

      - name: Prune archive to 13 snapshots
        run: |
          ls -1t output/archive/products_*.csv 2>/dev/null | tail -n +14 | xargs -r rm -f

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/products.csv output/last_updated_ist.txt output/archive/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: weekly scraper data update"
          git push origin HEAD:main
