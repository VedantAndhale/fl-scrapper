name: Daily Scraper Update

on:
  schedule:
    # 15:27 IST every day
    - cron: "57 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python main.py --output output/products.csv

      - name: Generate IST timestamp file
        run: |
          mkdir -p output
          TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST" > output/last_updated_ist.txt

      - name: Build weekly inventory history
        run: |
          python weekly_history.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: daily scraper data update"
          git push origin HEAD:${{ github.event.repository.default_branch }}
